spring.application.name=home-task-service

# ── Database ──────────────────────────────────────────────────────────────────
# Local default: H2 in-memory
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:hometask;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=false
#spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.enabled=false

# ── App config ────────────────────────────────────────────────────────────────
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.family.child1-name=${CHILD1_NAME:Clara}
app.family.child2-name=${CHILD2_NAME:Bernardo}

server.port=${PORT:8080}

# ── Schedulers ────────────────────────────────────────────────────────────────
# End-of-day missed-deadline penalty (00:01 every night)
scheduler.penalty-cron=0 1 0 * * *
# Hourly deadline notification check (XX:05 of every hour)
scheduler.notification-cron=0 5 * * * *
# Timezone for all schedulers — set this in Railway env vars
scheduler.timezone=America/Sao_Paulo

# ── WhatsApp / Twilio (set in Railway env vars — never commit real values) ────
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.whatsapp.from=${TWILIO_WA_FROM:}
whatsapp.child1=${WHATSAPP_CHILD1:}
whatsapp.child2=${WHATSAPP_CHILD2:}
whatsapp.parents=${WHATSAPP_PARENTS:}
