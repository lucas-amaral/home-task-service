spring.application.name=home-task-service

spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:hometask;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# Parametric family config - override via env vars or application-local.properties
app.family.child1-name=${CHILD1_NAME:Clara}
app.family.child2-name=${CHILD2_NAME:Bernardo}

server.port=${PORT:8080}
