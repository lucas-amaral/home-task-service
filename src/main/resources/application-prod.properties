spring.datasource.url=${DATABASE_URL:jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE}}
spring.datasource.username=${DATABASE_USERNAME:${PGUSER}}
spring.datasource.password=${DATABASE_PASSWORD:${PGPASSWORD}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.h2.console.enabled=false
