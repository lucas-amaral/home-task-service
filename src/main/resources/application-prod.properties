# O Railway injeta DATABASE_URL em dois formatos poss脙颅veis:
#   (A) URI  芒聙聯 postgresql://user:pass@host:5432/dbname
#   (B) JDBC 芒聙聯 jdbc:postgresql://host:5432/dbname
#
# A classe DatabaseConfig normaliza automaticamente o formato (A) 芒聠聮 (B)
# via @PostConstruct antes do HikariCP inicializar.
#
# Vari脙隆veis configuradas no Railway:
#   DATABASE_URL      -> ${{Postgres.DATABASE_URL}}
#   DATABASE_USERNAME -> ${{Postgres.PGUSER}}
#   DATABASE_PASSWORD -> ${{Postgres.PGPASSWORD}}
#   DATABASE_DRIVER   -> org.postgresql.Driver

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=${DATABASE_DRIVER}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false
