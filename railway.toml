[build]
builder = "NIXPACKS"
buildCommand = "./gradlew bootJar"

[variables]
NIXPACKS_JDK_VERSION = "17"

[deploy]
startCommand = "java -jar build/libs/home-task-service.jar"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"

# Required environment variables (set in Railway dashboard):
#
#   SPRING_PROFILES_ACTIVE = prod
#   DATABASE_URL           = ${{Postgres.DATABASE_URL}}    ← set automatically by plugin
#   FRONTEND_URL           = https://your-app.vercel.app
#   TZ                     = America/Sao_Paulo             ← for cron timezone
#
# Optional overrides:
#   CHILD1_NAME            = Clara
#   CHILD2_NAME            = Bernardo