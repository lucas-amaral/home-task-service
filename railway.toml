[build]
builder = "NIXPACKS"
buildCommand = "./gradlew bootJar"

[variables]
NIXPACKS_JDK_VERSION = "17"

[deploy]
startCommand = "java -jar build/libs/home-task-service.jar"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"

# SPRING_PROFILES_ACTIVE=prod must also be set as an environment variable
# in the Railway dashboard — see DEPLOY.md